name: CI

on:
  pull_request:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages
      - run: uv run poe ci:format
      - run: uv run poe ci:lint
      - run: uv run poe check
      - run: uv run poe lint-imports
      - run: uv run poe test

  build-images:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build cortex-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.python
          build-args: SERVICE=cortex-server
          push: false
          tags: cortex/cortex-server:ci
      - name: Build sync-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.python
          build-args: SERVICE=sync-worker
          push: false
          tags: cortex/sync-worker:ci
      - name: Build ingestion-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.python
          build-args: SERVICE=ingestion-worker
          push: false
          tags: cortex/ingestion-worker:ci
