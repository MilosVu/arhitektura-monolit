[project]
name = "module-alfresco"
version = "0.1.0"
description = "Cortex AI module — Alfresco delta sync and Celery sync tasks"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "celery>=5.3",
    "httpx>=0.27",
]

[tool.uv.sources]
cortex-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_alfresco"]
