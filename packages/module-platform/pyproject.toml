[project]
name = "module-platform"
version = "0.1.0"
description = "Cortex AI module — auth, cases, audit, sync trigger, system"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "module-ai",
    "fastapi>=0.115",
    "python-jose[cryptography]>=3.3",
    "celery>=5.3",
    "httpx>=0.27",
]

[tool.uv.sources]
cortex-core = { workspace = true }
module-ai = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_platform"]
