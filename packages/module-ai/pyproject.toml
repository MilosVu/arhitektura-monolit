[project]
name = "module-ai"
version = "0.1.0"
description = "Cortex AI module — agents, LLM, RAG, chat, laws"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "fastapi>=0.115",
    "neo4j>=5.0",
]

[tool.uv.sources]
cortex-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_ai"]
