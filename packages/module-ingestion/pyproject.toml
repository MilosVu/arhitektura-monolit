[project]
name = "module-ingestion"
version = "0.1.0"
description = "Cortex AI module — OCR, chunk, embed, Weaviate ingestion tasks"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "cortex-models",
    "cortex-connectors",
    "module-documents",
    "celery>=5.3",
]

[tool.uv.sources]
cortex-core = { workspace = true }
cortex-models = { workspace = true }
cortex-connectors = { workspace = true }
module-documents = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_ingestion"]
