[project]
name = "module-law-sync"
version = "0.1.0"
description = "Cortex AI module — Swiss law corpus sync and versioning"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "cortex-models",
    "cortex-connectors",
    "fastapi>=0.115",
    "celery>=5.3",
    "python-jose[cryptography]>=3.3",
]

[tool.uv.sources]
cortex-core = { workspace = true }
cortex-models = { workspace = true }
cortex-connectors = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_law_sync"]
