[project]
name = "module-chat"
version = "0.1.0"
description = "Cortex AI module — chat threads and Redis persistence"
requires-python = ">=3.12"
dependencies = [
    "cortex-core",
    "cortex-models",
    "module-ai",
    "fastapi>=0.115",
    "python-jose[cryptography]>=3.3",
]

[tool.uv.sources]
cortex-core = { workspace = true }
cortex-models = { workspace = true }
module-ai = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["module_chat"]
