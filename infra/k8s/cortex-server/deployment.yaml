apiVersion: v1
kind: Service
metadata:
  name: cortex-server
  namespace: cortex-monolith
  labels:
    app: cortex-server
    app.kubernetes.io/component: platform
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app: cortex-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-server
  namespace: cortex-monolith
  labels:
    app: cortex-server
    app.kubernetes.io/component: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-server
  template:
    metadata:
      labels:
        app: cortex-server
        app.kubernetes.io/component: platform
    spec:
      enableServiceLinks: false
      containers:
        - name: cortex-server
          image: cortex/cortex-server:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: cortex-config
          env:
            - name: SERVICE
              value: cortex-server
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cortex-secrets
                  key: JWT_SECRET
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cortex-secrets
                  key: NEO4J_PASSWORD
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
