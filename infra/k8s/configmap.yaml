apiVersion: v1
kind: ConfigMap
metadata:
  name: cortex-config
  namespace: cortex-monolith
data:
  DATABASE_URL: "postgresql+psycopg://cortex:cortex@postgres:5432/cortex"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "amqp://cortex:cortex@rabbitmq:5672//"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"
  JWT_ALGORITHM: "HS256"
  WEAVIATE_URL: "http://weaviate:8080"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  RABBITMQ_MANAGEMENT_URL: "http://rabbitmq:15672"
