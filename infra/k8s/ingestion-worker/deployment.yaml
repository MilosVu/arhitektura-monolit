apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: cortex-monolith
  labels:
    app: ingestion-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-worker
  template:
    metadata:
      labels:
        app: ingestion-worker
        app.kubernetes.io/component: worker
    spec:
      enableServiceLinks: false
      containers:
        - name: ingestion-worker
          image: cortex/ingestion-worker:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: cortex-config
          env:
            - name: SERVICE
              value: ingestion-worker
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cortex-secrets
                  key: NEO4J_PASSWORD
